name: Refresh Strava data

on:
  schedule:
    - cron: '0 7 * * *' # 07:00 UTC daily
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Fetch latest Strava activities
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_ACCESS_TOKEN: ${{ secrets.STRAVA_ACCESS_TOKEN }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: npm run fetch-strava

      - name: Commit updated data
        run: |
          git config user.name "chubby-run-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/activities.json
          git diff --staged --quiet || git commit -m "chore: daily Strava data refresh"
          git push

      - name: Deploy to Bluehost
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.env
            **/scripts/**
            **/logos/**
            **/gallery/medals/**
            **/gallery/*.jpg
            **/gallery/*.png
            **/strava-badges/**
            **/node_modules/**
            **/package.json
            **/package-lock.json
            **/README.md
            **/.github/**
